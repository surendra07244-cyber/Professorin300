<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FBF3F6">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>UPPSC 2027 · Anuradha's Study Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#F6D8DE;
    --blush-deep:#E8AFC0;
    --lav:#E6E1F5;
    --lav-deep:#C9BEEA;
    --cream:#FBF6F0;
    --sage:#CFE3D4;
    --sage-deep:#8FBBA0;
    --ink:#4A3F45;
    --ink-soft:#8B7C84;
    --gold:#E3B655;
    --white:#FFFEFC;
    --line:#EFE2E7;
    --shadow: 0 6px 24px rgba(180,140,160,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  a,button,.task,.card,.seal,.mini-cal .cell,.mood-row button,.backlog-item,.navbar button{transition:transform .18s ease, box-shadow .18s ease, background-color .25s ease, opacity .25s ease;}
  button:active,.gate-btn:active{transform:scale(0.96);}
  .task:active{transform:scale(0.99);}
  #app.fade-swap{animation:fadeUp .32s ease both;}
  body{
    background:
      radial-gradient(circle at 15% 0%, var(--lav) 0%, transparent 45%),
      radial-gradient(circle at 90% 10%, var(--blush) 0%, transparent 40%),
      linear-gradient(180deg, var(--cream), #FDFAF6 60%, var(--cream));
    min-height:100vh;
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    padding-bottom:50px;
  }
  .wrap{max-width:720px;margin:0 auto;padding:16px 14px 30px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);}}
  @keyframes pop{0%{transform:scale(0.7);opacity:0;} 60%{transform:scale(1.08);opacity:1;} 100%{transform:scale(1);}}
  @keyframes float{0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);}}
  @keyframes shimmer{0%{background-position:-200px 0;} 100%{background-position:200px 0;}}
  @keyframes burstFly{0%{transform:translate(0,0) scale(1);opacity:1;} 100%{transform:translate(var(--tx),var(--ty)) scale(0.4);opacity:0;}}
  .fade-in{animation:fadeUp .5s ease both;}

  /* ===== PIN GATE ===== */
  #gate{
    position:fixed;inset:0;z-index:50;
    background:linear-gradient(160deg, var(--lav), var(--blush));
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .gate-card{
    background:var(--white);border-radius:22px;box-shadow:var(--shadow);
    padding:30px 26px;max-width:340px;width:100%;text-align:center;
    animation:pop .45s ease both;
  }
  .gate-card .gicon{font-size:34px;animation:float 3s ease-in-out infinite;}
  .gate-card h2{font-family:'Cormorant Garamond',serif;font-size:24px;margin:8px 0 2px;color:var(--ink);}
  .gate-card p{font-size:12.5px;color:var(--ink-soft);margin:0 0 16px;}
  .pin-dots{display:flex;gap:10px;justify-content:center;margin:14px 0;}
  .pin-input{
    width:100%;text-align:center;letter-spacing:14px;font-size:22px;
    border:1.5px solid var(--line);border-radius:12px;padding:12px 10px;
    font-family:'Quicksand',sans-serif;background:var(--cream);color:var(--ink);
  }
  .gate-btn{
    width:100%;margin-top:12px;background:linear-gradient(135deg,var(--blush-deep),var(--lav-deep));
    color:var(--white);border:none;border-radius:12px;padding:12px;font-size:14.5px;font-weight:700;
    cursor:pointer;font-family:'Quicksand',sans-serif;letter-spacing:0.3px;
  }
  .gate-btn:active{transform:scale(0.98);}
  .gate-err{color:#C2607A;font-size:12px;margin-top:8px;min-height:16px;}
  .gate-link{display:block;margin-top:14px;font-size:11.5px;color:var(--ink-soft);text-decoration:underline;cursor:pointer;background:none;border:none;}

  /* ===== PROFILE HEADER ===== */
  .credit{
    text-align:center;font-family:'Quicksand',sans-serif;font-size:14px;letter-spacing:3.5px;
    text-transform:uppercase;color:#B23A5C;font-weight:700;margin-bottom:4px;
  }
  .profile-card{
    display:flex;align-items:center;gap:12px;background:var(--white);
    border-radius:20px;padding:12px 16px;box-shadow:var(--shadow);margin-bottom:14px;
  }
  .avatar{
    width:80px;height:80px;border-radius:50%;object-fit:cover;
    border:4px solid var(--blush);flex-shrink:0;
  }
  .profile-name{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--ink);font-weight:600;}
  .profile-sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}

  /* ===== Countdown seals ===== */
  .seal-row{display:flex;gap:10px;margin-bottom:14px;}
  .seal{
    flex:1;background:var(--white);border-radius:16px;padding:12px 6px;text-align:center;
    box-shadow:var(--shadow);
  }
  .seal .num{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--blush-deep);}
  .seal .lbl{font-size:9.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

  /* ===== Nav ===== */
  .navbar{
    display:flex;align-items:center;gap:8px;background:var(--white);
    border-radius:16px;padding:8px 10px;margin-bottom:12px;box-shadow:var(--shadow);
  }
  .navbar button{
    background:var(--lav);color:var(--ink);border:none;border-radius:10px;
    padding:9px 13px;font-size:15px;cursor:pointer;font-family:'Quicksand',sans-serif;
  }
  .navbar .today-btn{background:var(--sage-deep);color:var(--white);font-weight:700;font-size:12px;}
  .navbar .datepick{
    flex:1;text-align:center;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;
    color:var(--ink);cursor:pointer;line-height:1.2;
  }
  .navbar .datepick .dow{font-size:9.5px;font-family:'Quicksand',sans-serif;color:var(--ink-soft);letter-spacing:1.5px;text-transform:uppercase;}
  input[type=date]{
    width:100%;margin-top:6px;border:1px solid var(--line);border-radius:8px;padding:6px;
    font-family:'Quicksand',sans-serif;font-size:12.5px;background:var(--white);
  }
  .mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px;}
  .mini-cal .cell{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;
    font-size:11px;font-family:'Quicksand',sans-serif;border:1px solid var(--line);cursor:pointer;background:var(--cream);
  }
  .mini-cal .cell.blank{border:none;cursor:default;background:none;}
  .mini-cal .cell.today{border:2px solid var(--gold);font-weight:700;}
  .mini-cal .cell.sel{background:var(--blush-deep);color:white;}
  .mini-cal .dow-h{font-size:9px;text-align:center;color:var(--ink-soft);font-family:'Quicksand',sans-serif;}

  /* ===== Banners ===== */
  .banner{
    border-radius:16px;padding:11px 15px;margin-bottom:12px;font-size:12.5px;
    display:flex;align-items:center;gap:8px;font-family:'Quicksand',sans-serif;font-weight:600;
  }
  .banner.study{background:var(--lav);color:#5B4E86;}
  .banner.exam{background:linear-gradient(135deg,var(--gold),#F0CD84);color:#6b4c14;}
  .banner.rest{background:var(--sage);color:#356048;}

  /* ===== Progress ===== */
  .progress-wrap{margin-bottom:14px;}
  .progress-track{background:var(--line);border-radius:20px;height:11px;overflow:hidden;}
  .progress-fill{background:linear-gradient(90deg,var(--blush-deep),var(--lav-deep));height:100%;border-radius:20px;transition:width .4s ease;}
  .progress-label{font-size:11px;color:var(--ink-soft);text-align:right;margin-top:4px;}

  /* ===== Quote ===== */
  .quote-card{
    background:linear-gradient(135deg,var(--blush),var(--lav));border-radius:18px;padding:14px 18px;
    text-align:center;margin-bottom:14px;box-shadow:var(--shadow);
  }
  .quote-card .qtext{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15.5px;color:#5B4A5E;}

  /* ===== Section titles ===== */
  .section-title{
    font-family:'Quicksand',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--blush-deep);margin:18px 4px 8px;font-weight:700;
  }

  /* ===== Tasks ===== */
  .task{
    display:flex;gap:10px;align-items:flex-start;background:var(--white);
    border-radius:14px;padding:11px 13px;margin-bottom:9px;box-shadow:var(--shadow);
    transition:transform .15s ease;
    border-left:4px solid var(--lav-deep);
    position:relative;overflow:visible;
  }
  .task.done{border-left-color:var(--sage-deep);background:#F8FBF9;}
  .task.done .task-label{text-decoration:line-through;color:#a89ba1;}
  .task.plain{border-left-color:var(--gold);background:#FFFAF0;}
  .task.plain .task-time{color:#9c7a29;}
  .task input[type=checkbox]{
    width:22px;height:22px;flex-shrink:0;margin-top:1px;accent-color:var(--sage-deep);cursor:pointer;
  }
  .task-body{flex:1;}
  .task-time{font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;color:var(--blush-deep);letter-spacing:0.2px;}
  .task-label{font-size:14px;margin-top:2px;line-height:1.35;}
  .task-note{font-size:11px;color:var(--ink-soft);margin-top:3px;font-style:italic;}

  .burst{position:absolute;right:14px;top:6px;font-size:16px;pointer-events:none;}

  #celebrate-toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--white);border-radius:16px;box-shadow:var(--shadow);
    padding:12px 20px;text-align:center;max-width:88%;opacity:0;transition:all .35s ease;z-index:60;
  }
  #celebrate-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #celebrate-toast .ctext{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:#5B4A5E;}
  #celebrate-toast .cemoji{font-size:20px;}

  /* ===== Overview ===== */
  .overview-track{margin-bottom:10px;}
  .overview-track h4{
    font-family:'Cormorant Garamond',serif;font-size:15px;margin:0 0 6px;color:var(--ink);
  }
  .ov-item{
    display:flex;justify-content:space-between;align-items:center;background:var(--cream);
    border-radius:10px;padding:7px 12px;margin-bottom:5px;font-size:12px;
  }
  .ov-item .ov-name{font-weight:700;color:var(--ink);}
  .ov-item .ov-dates{color:var(--ink-soft);font-size:11px;}

  .card{background:var(--white);border-radius:18px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .card h3{font-family:'Cormorant Garamond',serif;font-size:16px;margin:0 0 8px;color:var(--ink);}
  .tip-list{margin:0;padding-left:18px;font-size:12.5px;line-height:1.65;color:#5c5058;}

  details summary{cursor:pointer;font-family:'Quicksand',sans-serif;font-size:11.5px;color:var(--blush-deep);letter-spacing:0.4px;font-weight:600;}
  details[open] summary{margin-bottom:8px;}

  .backup-row{display:flex;gap:8px;flex-wrap:wrap;}
  .backup-row button{
    flex:1;min-width:130px;background:var(--lav-deep);color:white;border:none;border-radius:12px;
    padding:10px;font-family:'Quicksand',sans-serif;font-size:12.5px;cursor:pointer;font-weight:700;
  }
  .backup-row button.alt{background:var(--blush-deep);}
  textarea{width:100%;min-height:80px;font-family:'Quicksand',sans-serif;font-size:11px;border:1px solid var(--line);border-radius:8px;padding:8px;}

  #sync-pill{
    position:fixed;top:10px;right:10px;background:var(--white);border-radius:20px;padding:4px 10px;
    font-size:10px;color:var(--sage-deep);box-shadow:var(--shadow);font-family:'Quicksand',sans-serif;font-weight:700;
    display:flex;align-items:center;gap:5px;z-index:40;
  }
  #sync-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--sage-deep);}

  footer{text-align:center;font-size:13px;color:var(--ink);margin-top:22px;font-family:'Quicksand',sans-serif;font-weight:600;letter-spacing:0.3px;}
  footer .fbrand{color:#B23A5C;font-weight:700;}

  /* ===== Backlog ===== */
  .backlog-item{
    display:flex;align-items:center;gap:8px;background:var(--cream);
    border-radius:10px;padding:8px 10px;margin-bottom:6px;
  }
  .backlog-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--sage-deep);flex-shrink:0;cursor:pointer;}
  .backlog-item span{flex:1;font-size:12.5px;}
  .backlog-item.done span{text-decoration:line-through;color:#a89ba1;}
  .backlog-item button{background:none;border:none;color:var(--blush-deep);font-size:14px;cursor:pointer;padding:2px 4px;}
  .backlog-add{display:flex;gap:6px;margin-top:8px;}
  .backlog-add input{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-family:'Quicksand',sans-serif;font-size:12.5px;}
  .backlog-add button{background:var(--sage-deep);color:white;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer;font-weight:700;}

  /* ===== Weekly AI Report ===== */
  .wk-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .wk-day{width:36px;font-size:10.5px;color:var(--ink-soft);font-family:'Quicksand',sans-serif;}
  .wk-track{flex:1;background:var(--line);border-radius:10px;height:9px;overflow:hidden;}
  .wk-fill{height:100%;background:linear-gradient(90deg,var(--sage-deep),var(--blush-deep));border-radius:10px;}
  .wk-pct{width:36px;text-align:right;font-size:10.5px;color:var(--ink-soft);}
  .wk-insight{background:var(--lav);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:12.5px;color:#5B4E86;font-weight:600;}

  /* ===== Wellness / Girls-focused features ===== */
  .well-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
  .well-label{font-size:12.5px;font-weight:700;color:var(--ink);}
  .counter{display:flex;align-items:center;gap:10px;}
  .counter button{width:28px;height:28px;border-radius:50%;border:none;background:var(--lav-deep);color:white;font-size:16px;cursor:pointer;}
  .counter .cval{font-family:'Cormorant Garamond',serif;font-size:18px;min-width:20px;text-align:center;}
  .mood-row{display:flex;gap:6px;flex-wrap:wrap;}
  .mood-row button{font-size:20px;background:var(--cream);border:2px solid transparent;border-radius:10px;padding:5px 8px;cursor:pointer;}
  .mood-row button.sel{border-color:var(--blush-deep);background:var(--blush);}
  .sleep-input{width:60px;border:1px solid var(--line);border-radius:8px;padding:6px;font-family:'Quicksand',sans-serif;text-align:center;}
  .health-btn{width:100%;background:linear-gradient(135deg,var(--sage-deep),var(--sage));color:white;border:none;border-radius:12px;padding:10px;font-weight:700;cursor:pointer;font-family:'Quicksand',sans-serif;font-size:12.5px;margin-top:4px;}
  .achiever-card{background:linear-gradient(135deg,var(--blush),var(--lav));border-radius:14px;padding:12px 14px;}
  .achiever-card .a-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:#5B4A5E;}
  .achiever-card .a-fact{font-size:12px;color:#5c5058;margin-top:3px;}
  .wa-btn{display:inline-flex;align-items:center;gap:8px;background:#25D366;color:white;border:none;border-radius:12px;padding:11px 16px;font-weight:700;font-size:13px;cursor:pointer;text-decoration:none;font-family:'Quicksand',sans-serif;}

  /* ===== Streak / Strict Mode ===== */
  .streak-row{display:flex;gap:10px;}
  .streak-box{flex:1;background:linear-gradient(135deg,var(--gold),#F3D9A0);border-radius:14px;padding:12px;text-align:center;}
  .streak-box .snum{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#6b4c14;}
  .streak-box .slbl{font-size:10px;color:#7a5a1c;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .strict-banner{background:linear-gradient(135deg,#F6D8DE,#E6E1F5);border-left:4px solid #B23A5C;border-radius:12px;padding:10px 12px;font-size:12px;color:#5B4A5E;margin-top:8px;font-weight:600;}

  /* ===== Revision reminders ===== */
  .rev-item{display:flex;gap:10px;align-items:flex-start;background:var(--cream);border-radius:12px;padding:9px 12px;margin-bottom:7px;}
  .rev-tag{font-family:'Quicksand',sans-serif;font-size:10px;font-weight:700;color:var(--sage-deep);text-transform:uppercase;letter-spacing:0.5px;}
  .rev-item .rt{flex:1;}
  .rev-item .rt-topic{font-size:12.5px;margin-top:2px;}
  .rev-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--sage-deep);cursor:pointer;flex-shrink:0;margin-top:2px;}

  /* ===== To-Do list ===== */
  .todo-item{display:flex;align-items:center;gap:8px;background:var(--cream);border-radius:10px;padding:8px 10px;margin-bottom:6px;}
  .todo-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--lav-deep);flex-shrink:0;cursor:pointer;}
  .todo-item span{flex:1;font-size:12.5px;}
  .todo-item.done span{text-decoration:line-through;color:#a89ba1;}
  .todo-item button{background:none;border:none;color:var(--blush-deep);font-size:14px;cursor:pointer;padding:2px 4px;}
  .todo-add{display:flex;gap:6px;margin-top:8px;}
  .todo-add input{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-family:'Quicksand',sans-serif;font-size:12.5px;}
  .todo-add button{background:var(--lav-deep);color:white;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer;font-weight:700;}

  /* ===== Daily Review (mood + reflection) ===== */
  .review-mood-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .rating-row{display:flex;gap:6px;margin-bottom:10px;}
  .rating-row button{flex:1;background:var(--cream);border:2px solid transparent;border-radius:10px;padding:8px 0;font-size:16px;cursor:pointer;}
  .rating-row button.sel{border-color:var(--sage-deep);background:var(--sage);}
  .review-note{width:100%;min-height:60px;font-family:'Quicksand',sans-serif;font-size:12.5px;border:1px solid var(--line);border-radius:10px;padding:8px;}

  /* ===== Sleep mandatory note ===== */
  .sleep-warn{background:linear-gradient(135deg,var(--lav),var(--blush));border-radius:12px;padding:9px 12px;font-size:11.5px;color:#5B4A5E;margin-top:6px;font-weight:600;}

  /* ===== Ask Professor (AI Q&A) ===== */
  .ask-input-row{display:flex;gap:6px;margin-bottom:8px;}
  .ask-input-row input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-family:'Quicksand',sans-serif;font-size:12.5px;}
  .ask-input-row button{background:var(--blush-deep);color:white;border:none;border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer;font-weight:700;}
  .ask-chip{display:inline-block;background:var(--cream);border-radius:20px;padding:5px 11px;font-size:11px;margin:2px 4px 2px 0;cursor:pointer;color:#5c5058;font-family:'Quicksand',sans-serif;}
  .ask-answer{background:var(--lav);border-radius:12px;padding:11px 13px;margin-top:8px;font-size:12.5px;color:#4a3f45;line-height:1.55;}
  .ask-answer .ask-q{font-weight:700;color:#5B4E86;margin-bottom:4px;}

  /* ===== Install App ===== */
  .install-btn{width:100%;background:linear-gradient(135deg,var(--lav-deep),var(--blush-deep));color:white;border:none;border-radius:12px;padding:11px;font-weight:700;cursor:pointer;font-family:'Quicksand',sans-serif;font-size:12.5px;margin-top:6px;}
</style>
</head>
<body>

<div id="sync-pill"><span class="dot"></span><span id="sync-text">saved</span></div>

<div id="gate">
  <div class="gate-card" id="gateCard"></div>
</div>

<div class="wrap" id="app" style="display:none;">Loading…</div>
<div id="celebrate-toast"></div>

<script>
/* =========================================================
   DATA MODEL — UPPSC 2027 (Anuradha)
========================================================= */
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function d(s){ const [y,m,day]=s.split('-').map(Number); const dt=new Date(y,m-1,day); dt.setHours(0,0,0,0); return dt; }
function ds(dt){ return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function addDays(dt,n){ const r=new Date(dt); r.setDate(r.getDate()+n); r.setHours(0,0,0,0); return r; }
function diffDays(a,b){ return Math.round((b-a)/86400000); }
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function findWindow(list, dt){
  const s = ds(dt);
  for(const w of list){ if(s>=w.start && s<=w.end) return w; }
  return null;
}
function pick(pool, dt, anchor, stride){
  stride = stride||1;
  const idx = diffDays(anchor, dt)*stride;
  const n = pool.length;
  return pool[((idx%n)+n)%n];
}
function pick2(pool, dt, anchor){
  const n = pool.length;
  const base = diffDays(anchor, dt)*2;
  const i1 = ((base%n)+n)%n;
  const i2 = ((base+1)%n+n)%n;
  return [pool[i1], pool[i2]];
}

function coachTopic(dt, win){
  if(win.tag==='Geography') return pick(GEO_TOPICS, dt, d(win.start));
  if(win.tag==='Economics') return pick(ECO_TOPICS, dt, d(win.start));
  if(win.tag==='Polity') return pick(POL_TOPICS, dt, d(win.start));
  if(win.tag==='Ethics (Mains)') return pick(ETHICS_TOPICS, dt, d(win.start));
  if(win.tag.indexOf('Buffer')===0){
    const rot = BUFFER_ROTATION[diffDays(PLAN_START,dt)%BUFFER_ROTATION.length];
    return rot.tag+' — '+pick(rot.pool, dt, PLAN_START);
  }
  return null;
}
function selfTopics(dt, win){
  if(win.tag==='Ancient History') return pick2(ANCIENT_TOPICS, dt, d(win.start));
  if(win.tag==='Medieval History') return pick2(MEDIEVAL_TOPICS, dt, d(win.start));
  if(win.tag==='Modern History') return pick2(MODERN_TOPICS, dt, d(win.start));
  if(win.tag==='Science & Technology') return pick2(SCITECH_TOPICS, dt, d(win.start));
  if(win.tag==='UP Special') return pick2(UP_SPECIAL_TOPICS, dt, d(win.start));
  if(win.tag==='Mains Foundation Revision'){
    const i1 = diffDays(PLAN_START,dt)%MAINS_FOUNDATION_ROTATION.length;
    const i2 = (i1+1)%MAINS_FOUNDATION_ROTATION.length;
    const rot1 = MAINS_FOUNDATION_ROTATION[i1], rot2 = MAINS_FOUNDATION_ROTATION[i2];
    return [rot1.tag+' — '+pick(rot1.pool, dt, PLAN_START), rot2.tag+' — '+pick(rot2.pool, dt, PLAN_START)];
  }
  if(win.tag.indexOf('Buffer')===0){
    const i1 = (diffDays(PLAN_START,dt)+3)%BUFFER_ROTATION.length;
    const i2 = (i1+1)%BUFFER_ROTATION.length;
    const rot1 = BUFFER_ROTATION[i1], rot2 = BUFFER_ROTATION[i2];
    return [rot1.tag+' — '+pick(rot1.pool, dt, PLAN_START), rot2.tag+' — '+pick(rot2.pool, dt, PLAN_START)];
  }
  return [null,null];
}

function setSync(state){
  const el = document.getElementById('sync-text');
  const pill = document.getElementById('sync-pill');
  if(!el) return;
  if(state==='saving'){ el.textContent='saving…'; pill.style.opacity='0.7'; }
  else if(state==='ok'){ el.textContent='saved'; pill.style.opacity='1'; }
  else { el.textContent='offline'; pill.style.opacity='0.5'; }
}
/* No backend/API — everything saves straight to this device's browser
   storage (localStorage), so the planner works fully offline once hosted
   on GitHub Pages. Every tick/tap auto-saves instantly. "Cloud Sync" below
   is a manual Export/Import — download a backup file and keep it in your
   own Google Drive / WhatsApp-to-self, then Import it on any other device
   to carry your progress across phones/laptops. */
const LS_PREFIX = 'anuradha_uppsc:';
async function storeGet(key){
  try{ return localStorage.getItem(LS_PREFIX+key); }catch(e){ return null; }
}
async function storeSet(key,val){
  setSync('saving');
  let ok=false;
  try{ localStorage.setItem(LS_PREFIX+key, val); ok=true; }catch(e){ ok=false; }
  setSync(ok?'ok':'err');
  return ok;
}
async function storeDelete(key){
  try{ localStorage.removeItem(LS_PREFIX+key); }catch(e){}
}
async function storeListPrefix(prefix){
  const keys = new Set();
  try{
    for(let i=0;i<localStorage.length;i++){
      const full = localStorage.key(i);
      if(full && full.indexOf(LS_PREFIX+prefix)===0) keys.add(full.slice(LS_PREFIX.length));
    }
  }catch(e){}
  return Array.from(keys);
}
async function getChecked(key){ const v = await storeGet('chk:'+key); return v==='1'; }
async function setChecked(key,val){ await storeSet('chk:'+key, val?'1':'0'); }

/* =========================================================
   BUILD DAY
========================================================= */
function buildDay(dt){
  const dateStr = ds(dt);
  const day = {date:dateStr, dow:dt.getDay(), dayNum: diffDays(PLAN_START,dt)+1, tasks:[], phase:null};

  if(dt < PLAN_START){ day.phase='out'; return day; }

  if(ds(dt)===ds(PRELIMS_EXAM)){ day.phase='exam'; return day; }
  const gapStart = addDays(PRELIMS_EXAM,1), gapEnd = addDays(PRELIMS_EXAM,3);
  if(dt>=gapStart && dt<=gapEnd){
    day.phase='rest';
    day.tasks.push({id:'rest1', time:'All Day', label:'Post-exam recovery — relax, light current affairs only', checkbox:true, plain:true});
    return day;
  }

  day.phase='study';
  const cWin = findWindow(COACH_WINDOWS, dt);
  const sWin = findWindow(SELF_WINDOWS, dt);
  const selfArr = sWin ? selfTopics(dt,sWin) : [null,null];
  const selfTag = sWin ? sWin.tag : 'Self-Study';

  day.coachTag = cWin ? cWin.tag : '';
  day.selfTag = selfTag;

  const isSunday = (dt.getDay()===0);

  day.tasks.push({id:'d1', time:'12:00 – 6:30 AM', label:'Sleep', checkbox:false, plain:true,
    note:'😴 Sleep is mandatory, isse skip mat karo — bina puri neend ke agle din focus, memory aur mood sab kharab ho jaate hain, aur padha hua bhi yaad nahi rehta. 7–8 ghante ki neend lo, chahe schedule kitna bhi tight kyun na ho.'});
  day.tasks.push({id:'d2', time:'6:30 – 7:00 AM', label:'Wake up & shower', checkbox:false, plain:true});
  day.tasks.push({id:'d3', time:'7:00 – 8:00 AM', label:'Breakfast & morning prep', checkbox:false, plain:true});
  day.tasks.push({id:'d4', time:'8:00 – 11:00 AM', label:'Coaching Class — '+(cWin?cWin.tag:'General'), checkbox:true});
  day.tasks.push({id:'d5', time:'11:00 AM – 1:00 PM', label:'Commute, rest & lunch', checkbox:false, plain:true});
  day.tasks.push({id:'d6', time:'1:00 – 3:30 PM', label:'Self-Study Block 1 — '+selfTag+(selfArr[0]?(' — '+selfArr[0]):''), checkbox:true, note:guidanceFor(selfTag)});
  day.tasks.push({id:'d7', time:'3:30 – 4:00 PM', label:'Active Break — UP Special Facts / quick PYQs', checkbox:true});
  if(isSunday){

}

function renderMiniCalendar(dt){
  const y=dt.getFullYear(), m=dt.getMonth();
  const first=new Date(y,m,1); const startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  let html = `<div style="font-family:'Cormorant Garamond',serif;font-size:15px;text-align:center;margin-bottom:6px;">${MON[m]} ${y}</div><div class="mini-cal">`;
  ['S','M','T','W','T','F','S'].forEach(x=>html+=`<div class="dow-h">${x}</div>`);
  for(let i=0;i<startDow;i++) html+=`<div class="cell blank"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const cur=new Date(y,m,day); const cs=ds(cur);
    let cls='cell';
    if(cs===ds(TODAY)) cls+=' today';
    if(cs===ds(selectedDate)) cls+=' sel';
    html += `<div class="${cls}" onclick="jumpTo('${cs}')">${day}</div>`;
  }
  html += `</div><input type="date" value="${ds(dt)}" onchange="jumpTo(this.value)">`;
  return html;
}

/* =========================================================
   STREAK / STRICT SCHEDULE MODE
========================================================= */
async function computeStreak(){
  let current = 0;
  for(let i=0;i<90;i++){
    const target = addDays(TODAY, -i);
    if(target < PLAN_START) break;
    const day = buildDay(target);
    const checkable = day.tasks.filter(t=>t.checkbox);
    if(!checkable.length) break;
    const isHD = (await storeGet('healthday:'+day.date)) === '1';
    if(isHD){ continue; } // health days don't break the streak
    let done=0;
    for(const t of checkable){ if(await getChecked(day.date+':'+t.id)) done++; }
    const pct = Math.round(100*done/checkable.length);
    if(pct>=80){ current++; } else { break; }
  }
  const bestRaw = await storeGet('streak:best');
  const best = Math.max(parseInt(bestRaw||'0',10), current);
  await storeSet('streak:best', String(best));
  let message;
  if(current===0) message = "Aaj se strict mode shuru karein — 80%+ tasks poore karke apna streak banayein. Ek din bhi miss mat karein, consistency hi sabse badi taqat hai.";
  else if(current<7) message = `${current} din ka streak — bahut badhiya! Isse todna mat, schedule se bilkul strict raho.`;
  else message = `${current} din ka streak — outstanding discipline! Yehi consistency tumhe under-300 rank tak le jayegi. 🌸`;
  return {current, best, message};
}

/* =========================================================
   REVISION REMINDERS (7 / 14 / 30 day spaced revision)
========================================================= */
async function computeRevisionReminders(dt){
  const gaps = [7,14,30];
  const items = [];
  for(const g of gaps){
    const target = addDays(dt, -g);
    if(target < PLAN_START) continue;
    const day = buildDay(target);
    if(day.phase!=='study') continue;
    const parts = [];
    if(day.coachTag) parts.push(day.coachTag);
    if(day.selfTag) parts.push(day.selfTag);
    if(!parts.length) continue;
    const id = 'rev'+g;
    const done = await getChecked(ds(dt)+':'+id);
    items.push({id, gap:g, text:parts.join(' + '), done});
  }
  return items;
}

/* =========================================================
   WEEKLY AI REPORT (locally computed, works fully offline)
========================================================= */
async function computeWeeklyStats(){
  const stats = [];
  for(let i=6;i>=0;i--){
    const target = addDays(TODAY, -i);
    const day = buildDay(target);
    const checkable = day.tasks.filter(t=>t.checkbox);
    let done = 0;
    for(const t of checkable){ if(await getChecked(day.date+':'+t.id)) done++; }
    const isHD = (await storeGet('healthday:'+day.date)) === '1';
    const pct = checkable.length ? Math.round(100*done/checkable.length) : 0;
    stats.push({date:day.date, dow:DOW[target.getDay()], pct, isHealthDay:isHD, hasData:checkable.length>0});
  }
  return stats;
}
function weeklyInsight(stats){
  const usable = stats.filter(s=>s.hasData && !s.isHealthDay);
  if(!usable.length) return "Is week ka data abhi available nahi hai — schedule shuru hote hi yahan insights dikhne lagenge.";
  const avg = Math.round(usable.reduce((a,s)=>a+s.pct,0)/usable.length);
  if(avg>=80) return `Excellent week! Average ${avg}% completion — is consistency ko exam tak banaye rakhein. 🌸`;
  if(avg>=50) return `Good effort — average ${avg}% completion. Thoda aur consistency se yeh 80%+ ho sakta hai. 💪`;
  return `Is week average ${avg}% raha — koi baat nahi, next week choti-choti wins par focus karein. Ek ek task pura karna hi kaafi hai. 🌷`;
}

function scoreMatch(query, entry){
  const qWords = query.toLowerCase().split(/\s+/).filter(w=>w.length>2);
  const kWords = entry.k.split(/\s+/);
  let score = 0;
  for(const w of qWords){ for(const k of kWords){ if(k.includes(w) || w.includes(k)) score++; } }
  return score;
}
function askProfessor(){
  const inp = document.getElementById('askInput');
  const box = document.getElementById('askAnswerBox');
  if(!inp || !box) return;
  const q = inp.value.trim();
  if(!q) return;
  let best = null, bestScore = 0;
  for(const entry of PROFESSOR_KB){
    const s = scoreMatch(q, entry);
    if(s>bestScore){ bestScore = s; best = entry; }
  }
  if(best && bestScore>=1){
    box.innerHTML = `<div class="ask-answer"><div class="ask-q">Q: ${q}</div>${best.a}</div>`;
  } else {
    const waText = encodeURIComponent(`Hi Professor, mera sawaal hai: ${q}`);
    box.innerHTML = `<div class="ask-answer"><div class="ask-q">Q: ${q}</div>Iska exact jawab abhi is guide mein nahi hai — Professor free hon toh seedha WhatsApp par pooch lein.<br><a class="wa-btn" style="margin-top:8px;" href="https://wa.me/919335146032?text=${waText}" target="_blank" rel="noopener">💬 Ask Professor on WhatsApp</a></div>`;
  }
}
